<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能销售数据分析系统</title>
    <!-- Vue.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <!-- Axios for HTTP requests -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>智能销售数据分析系统</h1>
            <p>基于大语言模型的智能问答与数据可视化平台</p>
        </header>

        <main class="main-container">
            <!-- 数据概览组件 -->
            <data-summary></data-summary>

            <!-- 智能问答组件 -->
            <chat-assistant></chat-assistant>

            <!-- 数据可视化组件 -->
            <data-visualization></data-visualization>

            <!-- 自然语言查询组件 -->
            <natural-query></natural-query>
        </main>
    </div>

    <!-- Vue组件 -->
    <script src="js/components/DataSummary.js"></script>
    <script src="js/components/ChatAssistant.js"></script>
    <script src="js/components/DataVisualization.js"></script>
    <script src="js/components/NaturalQuery.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
